services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: prism
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prism123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./apps/gateway/config.yaml:/app/config.yaml
    env_file: .env
    environment:
      DATABASE_URL: postgresql://prism:prism123@postgres:5432/prism
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
