appId: com.prism.app
productName: Prism
copyright: Copyright © 2024 Prism
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - package.json
extraResources:
  - from: ../web/.next/standalone
    to: next-server
    filter:
      - '**/*'
asar: true
asarUnpack:
  - '**/*.node'
win:
  target:
    - nsis
  icon: build/icon.ico
mac:
  target:
    - dmg
  icon: build/icon.icns
  category: public.app-category.developer-tools
linux:
  target:
    - AppImage
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
publish:
  provider: github
  releaseType: release
  # owner/repo auto-detected from GITHUB_REPOSITORY env var in CI
